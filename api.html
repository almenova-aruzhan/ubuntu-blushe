<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blushe — API (viewer)</title>
  <style>
    body { font-family: system-ui, Arial; margin: 20px; }
    pre { background:#111827; color:#e5e7eb; padding:12px; border-radius:10px; overflow:auto; }
    table { width:100%; border-collapse: collapse; margin-top:16px; }
    th, td { border-bottom:1px solid #e5e7eb; padding:10px; text-align:left; vertical-align: top; }
    th { background:#f3f4f6; }
    .muted { color:#6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Blushe API Viewer</h1>
  <div class="muted">Источник данных: <code>/api/products</code></div>

  <h2>Raw JSON</h2>
  <pre id="jsonBox">Загрузка…</pre>

  <h2>Товары</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Название</th><th>Цена</th><th>Описание</th><th>Ingredients</th><th>Skin</th><th>Concerns</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="7">Загрузка…</td></tr>
    </tbody>
  </table>

  <script>
    async function load() {
      const res = await fetch('/api/products?limit=50', { headers: { 'Accept': 'application/json' } });
      const data = await res.json();

      document.getElementById('jsonBox').textContent = JSON.stringify(data, null, 2);

      const rows = data.data || [];
      const tbody = document.getElementById('tbody');
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7">Пусто</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(p => `
        <tr>
          <td>${p.id ?? ''}</td>
          <td><b>${p.name ?? ''}</b></td>
          <td>${p.price ?? ''}</td>
          <td>${p.description ?? ''}</td>
          <td>${p.ingredients ?? ''}</td>
          <td>${p.skin_type ?? ''}</td>
          <td>${p.concerns ?? ''}</td>
        </tr>
      `).join('');
    }
    load();
  </script>

</body>
</html>
